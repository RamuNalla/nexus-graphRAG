services:
  # Neo4j Graph Database
  neo4j:
    image: neo4j:5.20.0
    container_name: nexus-neo4j
    ports:
      - "7474:7474" # Browser UI
      - "7687:7687" # Bolt connection for Python
    environment:
      - NEO4J_AUTH=neo4j/password123
      # APOC is the standard plugin library for Neo4j (crucial for GraphRAG)
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
      - NEO4J_apoc_import_file_use__neo4j__config=true
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  # Qdrant Vector Database
  qdrant:
    image: qdrant/qdrant:latest
    container_name: nexus-qdrant
    ports:
      - "6333:6333" # REST API & Web UI
      - "6334:6334" # gRPC for fast Python connection
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  api:
    build: .
    container_name: nexus-api
    ports:
      - "8000:8000"
    environment:
      # Use internal Docker network names instead of localhost
      - NEO4J_URI=bolt://neo4j:7687 
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=password123
      - QDRANT_URL=http://qdrant:6333
      - GROQ_API_KEY=${GROQ_API_KEY} # Pulls from your host machine's .env file
    depends_on:
      - neo4j
      - qdrant
    restart: unless-stopped

volumes:
  neo4j_data:
  qdrant_data: